services:
  postgres:
    image: postgres:16-alpine
    container_name: taggy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taggy
      POSTGRES_USER:     taggy_user
      POSTGRES_PASSWORD: taggy_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taggy_user -d taggy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./API/Dockerfile
    container_name: taggy_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: DEVELOPMENT
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Port=5432;Database=taggy;
        Username=taggy_user;Password=taggy_password;
        Pooling=true;MinPoolSize=1;MaxPoolSize=20
      Jwt__Secret:   "TROQUE_POR_UMA_CHAVE_SECRETA_DE_32_CARACTERES_OU_MAIS!!"
      Jwt__Issuer:   taggy-api
      Jwt__Audience: taggy-client

volumes:
  postgres_data:
  pgadmin_data: